<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nanobot Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #0a0c10;
            --bg-card: rgba(22, 27, 34, 0.7);
            --border: rgba(48, 54, 61, 0.8);
            --accent: #58a6ff;
            --accent-glow: rgba(88, 166, 255, 0.2);
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --terminal-bg: #010409;
            --success: #3fb950;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        aside {
            width: 260px;
            background: rgba(1, 4, 9, 0.9);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 40px;
        }

        nav ul { list-style: none; }
        nav li {
            padding: 12px 16px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-dim);
            transition: all 0.2s;
            margin-bottom: 4px;
        }
        nav li:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-main); }
        nav li.active { background: var(--accent-glow); color: var(--accent); border: 1px solid var(--accent); }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            background: rgba(1, 4, 9, 0.5);
            backdrop-filter: blur(10px);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            background: rgba(63, 185, 80, 0.1);
            color: var(--success);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(63, 185, 80, 0.3);
        }

        .content-grid {
            flex: 1;
            display: grid;
            grid-template-columns: 400px 1fr;
            overflow: hidden;
        }

        /* Sessions List */
        .sessions-panel {
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .session-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }
        .session-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .session-card h4 { font-size: 0.95rem; margin-bottom: 8px; color: var(--text-main); }
        .session-card .meta { font-size: 0.8rem; color: var(--text-dim); }

        /* Terminal View */
        .terminal-panel {
            background: var(--terminal-bg);
            display: flex;
            flex-direction: column;
            padding: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-y: auto;
            position: relative;
        }

        .terminal-panel::before {
            content: "LIVE LOGS";
            position: sticky;
            top: -20px;
            background: var(--terminal-bg);
            color: var(--accent);
            font-weight: bold;
            display: block;
            padding: 4px 0;
            margin-bottom: 12px;
            z-index: 10;
        }

        .log-entry { margin-bottom: 2px; }
        .log-time { color: var(--text-dim); margin-right: 8px; }
        .log-level-INFO { color: var(--success); }
        .log-level-DEBUG { color: var(--text-dim); }
        .log-level-WARNING { color: #e3b341; }
        .log-level-ERROR { color: #f85149; }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <i data-lucide="bot"></i>
            <span>NANOBOT</span>
        </div>
        <nav>
            <ul>
                <li class="active"><i data-lucide="layout-dashboard"></i> Dashboard</li>
                <li><i data-lucide="history"></i> History</li>
                <li><i data-lucide="settings"></i> Settings</li>
            </ul>
        </nav>
    </aside>

    <main>
        <header>
            <div class="model-info">
                <span style="color: var(--text-dim); font-size: 0.8rem;">Active Model:</span>
                <span id="active-model" style="font-weight: 600; margin-left: 8px;">Loading...</span>
            </div>
            <div class="status-badge">
                <div style="width: 8px; height: 8px; background: var(--success); border-radius: 50%;"></div>
                Gateway Online
            </div>
        </header>

        <div class="content-grid">
            <section class="sessions-panel" id="sessions-container">
                <h3 style="font-size: 0.9rem; color: var(--text-dim);">RECENT SESSIONS</h3>
                <!-- Sessions will be loaded here -->
            </section>

            <section class="terminal-panel" id="log-container">
                <!-- Logs will stream here -->
            </section>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Fetch Initial Status
        fetch('/api/status')
            .then(res => res.json())
            .then(data => {
                document.getElementById('active-model').innerText = data.model;
            });

        // Load Sessions
        function loadSessions() {
            fetch('/api/sessions')
                .then(res => res.json())
                .then(data => {
                    const container = document.getElementById('sessions-container');
                    // Keep the header
                    container.innerHTML = '<h3 style="font-size: 0.9rem; color: var(--text-dim);">RECENT SESSIONS</h3>';
                    
                    data.forEach(session => {
                        const card = document.createElement('div');
                        card.className = 'session-card';
                        card.innerHTML = `
                            <h4>${session.key}</h4>
                            <div class="meta">${new Date(session.updated_at).toLocaleString()}</div>
                        `;
                        container.appendChild(card);
                    });
                });
        }

        loadSessions();
        setInterval(loadSessions, 10000); // Refresh sessions every 10s

        // Stream Logs
        const logContainer = document.getElementById('log-container');
        const eventSource = new EventSource('/api/logs');

        eventSource.onmessage = function(event) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            // Basic log parsing for prettier display
            const raw = event.data;
            let levelClass = '';
            if (raw.includes('| INFO |')) levelClass = 'log-level-INFO';
            else if (raw.includes('| DEBUG |')) levelClass = 'log-level-DEBUG';
            else if (raw.includes('| WARNING |')) levelClass = 'log-level-WARNING';
            else if (raw.includes('| ERROR |')) levelClass = 'log-level-ERROR';

            entry.innerHTML = `<span class="${levelClass}">${raw}</span>`;
            logContainer.appendChild(entry);
            
            // Auto-scroll to bottom
            logContainer.scrollTop = logContainer.scrollHeight;

            // Cap logs at 500 lines
            if (logContainer.childElementCount > 500) {
                logContainer.removeChild(logContainer.firstChild);
            }
        };

        eventSource.onerror = function() {
            console.error("Log stream disconnected");
        };
    </script>
</body>
</html>
